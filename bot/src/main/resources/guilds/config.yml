# General Settings
settings:
  # Thread related settings
  threads:
    # Thread creation for announcements
    creation:
      # Should we create threads on these channels?
      enabled: false
      # A list of channels to automatically create threads for on every message.
      channels: []
  # Channel related settings to logs
  channels:
    # Settings related to msg logs
    message-logs:
      # Should logging be enabled?
      is-logging: false
      # The default channel for logging messages
      default: ""
      # The individual types to log
      types:
        # A list of channels to log deletions to.
        deletion: []
        # A list of channels to log message edits to.
        edits: []
      # A list of roles to be ignored when logging.
      # You must use the role id.
      roles: []
      # A list of channels to be ignored when logging.
      # You must use the channel id.
      channels: []
      # A list of users to be ignored when logging.
      # You must use the user id.
      users: []
  embed:
    # Should the embed be enabled?
    enabled: false
    # The title of the embed.
    title: "This is text with {user} variable."
    # The description of the embed.
    description: []
    # The footer settings
    footer:
      # Should the footer be enabled?
      enabled: false
      # Timestamp Timezone
      timezone: "America/New_York"