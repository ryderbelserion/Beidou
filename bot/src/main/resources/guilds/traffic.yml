# Traffic related settings
traffic:
  # The name of the module.
  join-module:
    # Role settings
    role-settings:
      # Should we give a role(s) on join?
      enabled: false
      # A list of role ids to give.
      roles: []
    # List of channels to send the message to.
    join-channel:
      - ""
    # The embed to send.
    embed:
      # Should the embed send on player join?
      toggle: false
      # The embed title
      title: "Welcome to {server} {player}"
      # The embed description
      description: []
      # The embed fields
      fields: {}
      # The embed footer
      footer: ""